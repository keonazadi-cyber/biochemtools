 :root{--bg:#0f1115;--card:#1a1d24;--line:#2a2e38;--txt:#e8eaed;--muted:#9aa0aa;--accent:#5dcaa5;--accent2:#378add;--head:#7f77dd}
 *{box-sizing:border-box}
 body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt);line-height:1.7}
 main{max-width:680px;margin:0 auto;padding:3.5rem 1.25rem 2rem}
 h1{font-size:1.9rem;font-weight:600;margin:0 0 1.25rem}
 p{color:var(--muted);margin:0 0 1rem}
 a.email{display:inline-block;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:1rem 1.4rem;color:var(--accent);text-decoration:none;font-weight:600;margin-top:.5rem}
 a.email:hover{border-color:var(--accent2)}
 footer{text-align:center;color:var(--muted);padding:2rem;font-size:.85rem}
 footer a{color:var(--muted);text-decoration:underline}

 .topnav{position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.5rem;background:rgba(15,17,21,.78);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid #2a2e38}
 .topnav-inner{max-width:1160px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between}
 .brand{display:flex;align-items:center;gap:.55rem;text-decoration:none;color:#e8eaed;font-weight:700;font-size:1.02rem;letter-spacing:-.01em}
 .brand .mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#5dcaa5,#7f77dd);display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:800;color:#0b0d11;flex-shrink:0}
 .topnav-links{display:flex;align-items:center;gap:1.6rem}
 .topnav-links a{color:#9aa0aa;text-decoration:none;font-size:.88rem;transition:color .15s}
 .topnav-links a:hover{color:#e8eaed}
 .topnav-links .navcta{background:#5dcaa5;color:#0b0d11;padding:.5rem 1.05rem;border-radius:8px;font-weight:600;transition:transform .15s,box-shadow .15s}
 .topnav-links .navcta:hover{color:#0b0d11;transform:translateY(-1px);box-shadow:0 6px 16px rgba(93,202,165,.3)}
 @media(max-width:640px){.topnav-links a:not(.navcta){display:none}}
